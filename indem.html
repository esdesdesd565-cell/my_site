<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة حب 💌</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(145deg, #ffb6c1, #ff69b4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #d1005e;
            font-size: 32px;
            margin-bottom: 20px;
        }
        button {
            background-color: #ff3388;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px #b3004b;
            transition: 0.3s;
        }
        button:hover {
            background-color: #ff0055;
            transform: scale(1.05);
        }
        #message {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
            color: #a30046;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💗 هل تفتح الرسالة؟ 💗</h1>
        <button onclick="showMessage()">اضغطي هنا</button>
        <div id="message">
            🌸 انتي جميلة 🌸
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').style.opacity = '1';
        }
    </script>
</body>
</html>
